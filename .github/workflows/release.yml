name: Publish Nav Data

on:
  schedule:
    # Daily. The job is idempotent: it only publishes a cycle whose release
    # does not yet exist, so running every day simply picks up each new AIRAC
    # cycle (and its data) as soon as the FAA sources become available.
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      cycle:
        description: "Cycle to generate: current, next, or YYYY-MM-DD. Blank = current and next."
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: publish-nav-data
  cancel-in-progress: false

jobs:
  publish:
    name: Generate and publish
    # macOS: several dependencies (SwiftNASR et al.) use Apple-only Foundation
    # APIs such as String(localized:) that aren't available on Linux Foundation.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
      - uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.3"
      - name: Install liblzma
        # Provides liblzma.pc (pkg-config) for StreamingLZMAXZ's Clzma system library.
        run: brew install xz
      - name: Build generator
        run: swift build -c release
      - name: Publish cycles
        env:
          GH_TOKEN: ${{ github.token }}
          # Pass the (maintainer-only) dispatch input via env, never inline, to
          # keep it out of the shell command line.
          DISPATCH_CYCLE: ${{ github.event.inputs.cycle }}
        run: |
          set -euo pipefail

          publish_cycle() {
            selector="$1"
            tag="$(swift run -c release nav-data-generator --print-cycle --cycle "$selector")"
            if gh release view "$tag" >/dev/null 2>&1; then
              echo "Release $tag already exists; skipping."
              return 0
            fi
            echo "Generating cycle ${tag}"
            rm -rf out && mkdir -p out
            swift run -c release nav-data-generator --cycle "$selector" --output out
            gh release create "$tag" "out/$tag.plist.lzma" \
              --title "Nav Data $tag" \
              --notes "Automated nav-data release for AIRAC cycle $tag."
            echo "Published $tag."
          }

          if [ -n "$DISPATCH_CYCLE" ]; then
            # Explicit manual request: publish exactly what was asked for.
            publish_cycle "$DISPATCH_CYCLE"
          else
            # Scheduled run: publish the current cycle, and the next one once its
            # source data is available (a failure there is non-fatal — a later
            # run retries).
            publish_cycle current
            publish_cycle next || \
              echo "Next-cycle data not yet available; a later run will retry."
          fi
