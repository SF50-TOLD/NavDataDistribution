name: Diagnose d-TPP

# Temporary: reproduces the Linux-only d-TPP parse failure. Delete once fixed.
on:
  workflow_dispatch:

jobs:
  diagnose:
    name: Diagnose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.3"
      - name: Install liblzma
        run: |
          sudo apt-get update
          sudo apt-get install -y liblzma-dev pkg-config
      - name: Probe the server from this runner
        run: |
          set -euo pipefail
          echo "=== identity ==="
          curl -sI "https://aeronav.faa.gov/d-tpp/2608/xml_data/d-TPP_Metafile.xml" \
            | grep -iE 'content-length|content-encoding|content-type' || true
          echo "=== gzip advertised ==="
          curl -s -H 'Accept-Encoding: deflate, gzip' -o /tmp/gz.bin -D /tmp/gz.hdr \
            "https://aeronav.faa.gov/d-tpp/2608/xml_data/d-TPP_Metafile.xml"
          grep -iE 'content-length|content-encoding' /tmp/gz.hdr || true
          echo "bytes received: $(wc -c < /tmp/gz.bin)"
          echo "first bytes: $(head -c 4 /tmp/gz.bin | xxd -p)"
      - name: Build generator
        run: swift build -c release
      - name: Run generator (no release published)
        run: |
          mkdir -p out
          swift run -c release nav-data-generator --cycle next --output out 2>&1 | tee run.log
          echo "=== d-TPP lines ==="
          grep -iE 'd-tpp|Named ' run.log || true
